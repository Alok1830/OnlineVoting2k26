{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Online Voting System - Mobile OTP Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'css/login.css' %}">

</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <div class="input-group">
      <label for="mobile">Registered Mobile Number</label>
      <input type="tel" id="mobile" placeholder="Enter your registered mobile (10 digits)" />
      <div class="small-hint">OTP will be sent only to this registered mobile number.</div>
    </div>
    <div class="otp-actions">
      <button id="getOtpBtn" class="btn-outline">Send OTP</button>
      <span id="otpTimer" class="small-hint"></span>
    </div>
    <div class="input-group">
      <label>Enter OTP</label>
      <div class="otp-row">
        <input type="number" class="otp-input" maxlength="1" />
        <input type="number" class="otp-input" maxlength="1" />
        <input type="number" class="otp-input" maxlength="1" />
        <input type="number" class="otp-input" maxlength="1" />
        <input type="number" class="otp-input" maxlength="1" />
        <input type="number" class="otp-input" maxlength="1" />
      </div>
      <div id="otpStatus" class="status-text">OTP verified</div>
    </div>
    <button id="loginBtn" class="btn-primary" disabled>Login</button>
    <div class="footer-text">
      New user? <a href="{% url 'registration' %}">Register</a>
    </div>
    <div class="footer-text" style="margin-top: 8px;">
      <a href="{% url 'admin_login_page' %}">Admin Login</a>
    </div>
  </div>
  <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
