{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Voter Dashboard - Online Voting System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/voter_panel.css' %}">

</head>
<body>
<div class="voter-container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2><i class="fas fa-vote-yea"></i> VoteSys</h2><p>Voter Dashboard</p></div>
    <div class="nav-menu">
      <div class="nav-item active" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></div>
      <div class="nav-item" data-section="active"><i class="fas fa-check-circle"></i> <span>Active Elections</span></div>
      <div class="nav-item" data-section="upcoming"><i class="fas fa-clock"></i> <span>Upcoming</span></div>
      <div class="nav-item" data-section="results"><i class="fas fa-chart-bar"></i> <span>Results</span></div>
    </div>
    <div class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div>
  </div>
  <div class="main-content">
    <div class="top-bar">
      <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
      <div class="user-info">
        <div class="greeting">
          <div class="greeting-message" id="greetingMessage">Good day,</div>
          <div class="voter-name" id="voterName">Voter</div>
        </div>
        <a href="{% url 'profile' %}" class="profile-link">
          <i class="fas fa-user-edit"></i>
          <span>Profile</span>
        </a>
        <img id="avatarImg" class="avatar" alt="Profile" src="https://ui-avatars.com/api/?background=2563eb&color=fff&rounded=true&bold=true&size=48">
      </div>
    </div>
    <div id="dynamicContent"></div>
  </div>
</div>

<!-- Voting Modal -->
<div id="voteModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Vote in Election</h3>
    <div id="modalCandidates"></div>
    <div class="modal-buttons">
      <button class="btn-secondary" id="closeModalBtn">Cancel</button>
      <button class="btn-primary" id="confirmVoteBtn">Confirm Vote</button>
    </div>
  </div>
</div>
<script src="{% static 'js/voter_panel.js' %}"></script>
</body>
</html>
